<!DOCTYPE html>

<head>

    <title>لعبة برا السالفة | النسخة العراقية</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            overscroll-behavior: none;
        }
        .glow-purple { box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .glow-gold { box-shadow: 0 0 15px rgba(234, 179, 8, 0.25); }
        .glass-panel {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] text-slate-100 flex flex-col justify-between overflow-hidden p-3 pb-8 sm:pb-3 select-none">

    <header class="w-full max-w-md mx-auto flex justify-center items-center mb-1 shrink-0 z-10">

            <span class="text-xl">🤫</span>
            <h1 class="text-base font-black bg-gradient-to-l from-yellow-400 to-amber-200 bg-clip-text text-transparent">برا السالفة! <span class="text-[10px] text-slate-400 font-normal ml-1 tracking-widest">v2.1</span></h1>
        </div>
    </header>

    <!-- نافذة تعديل الاسم -->

            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الرجوع للرئيسية -->
    <div id="homeConfirmModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">

            <span class="text-4xl block mb-2">🏠</span>
            <h3 class="text-base font-bold text-white">الرجوع للرئيسية؟</h3>

            <div class="flex gap-2 mt-4">
                <button onclick="closeHomeConfirm()" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 transition text-slate-300 rounded-xl text-xs font-bold">إلغاء</button>
                <button onclick="executeGoHome()" class="flex-1 py-2.5 bg-yellow-600 hover:bg-yellow-500 transition text-white rounded-xl text-xs font-bold">نعم، ارجع</button>
            </div>
        </div>
    </div>

    <!-- نافذة تصفير اللعبة -->

        function loadState() {
            const saved = localStorage.getItem('barrasalfa_iq_state_v7');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.playedWords) STATE.playedWords = parsed.playedWords;
                    if (parsed.players && parsed.players.length >= 3) {
                        STATE.players = parsed.players.map(p => ({...p, history: p.history || []}));
                    }
                    if (parsed.selectedCategory) STATE.selectedCategory = parsed.selectedCategory;
                    if (parsed.outsidersCountSetting) STATE.outsidersCountSetting = parsed.outsidersCountSetting;
                } catch(e) {}
            }
        }

        function saveState() {
            localStorage.setItem('barrasalfa_iq_state_v7', JSON.stringify({
                playedWords: STATE.playedWords,
                players: STATE.players,
                selectedCategory: STATE.selectedCategory,
                outsidersCountSetting: STATE.outsidersCountSetting
            }));
        }

        function selectSecretWordForCategory(catKey) {
            const allWords = WORD_DATABASE[catKey];
            const played = STATE.playedWords[catKey] || [];
            let remaining = allWords.filter(w => !played.includes(w));
            
            if (remaining.length === 0) {
                STATE.playedWords[catKey] = [];
                remaining = allWords;
            }
            
            const randomIndex = Math.floor(Math.random() * remaining.length);
            const chosen = remaining[randomIndex];
            STATE.playedWords[catKey].push(chosen);
            saveState();
            return chosen;
        }

        function getCategoryPlayedCount(catKey) { return (STATE.playedWords[catKey] || []).length; }

        function startNewRound() {
            let numOutsiders = 1;
            const playerCount = STATE.players.length;

            if (STATE.outsidersCountSetting === 'random') {
                const maxAllowed = Math.min(3, Math.max(1, playerCount - 2));
                numOutsiders = Math.floor(Math.random() * maxAllowed) + 1;
            } else {
                numOutsiders = parseInt(STATE.outsidersCountSetting, 10);
            }

            if (numOutsiders >= playerCount - 1) numOutsiders = Math.max(1, playerCount - 2);

            const playerIndices = STATE.players.map(p => p.id);
            const shuffledIds = [...playerIndices].sort(() => Math.random() - 0.5);
            const chosenOutsiders = shuffledIds.slice(0, numOutsiders);
            
            // ترتيب عشوائي للمصوتين
            const votingOrder = [...playerIndices].sort(() => Math.random() - 0.5);
            
            const word = selectSecretWordForCategory(STATE.selectedCategory);

            // تصفير الكاش هنا يمنع ظهور تخمينات الجولة السابقة إذا تكرر نفس اللاعب
            if (typeof lastGuesserId !== 'undefined') {
                lastGuesserId = null;
                cacheGuessOptions = [];
            }

            STATE.currentRound = {
                secretWord: word,
                outsiders: chosenOutsiders,
                activeRevealerIdx: 0,
                votes: {}, 
                outsiderGuesses: {},
                currentVotingPlayerIdx: 0,
                votingOrder: votingOrder,
                currentOutsiderGuessIdx: 0,
                selectedSuspects: [],
                forgotRolePlayerId: null
            };

            goToScreen('pass-to-player');
        }

        function goToScreen(screenName) {
            STATE.screen = screenName;
            render();
        }

        function render() {
            const container = document.getElementById('app');
            if (!container) return;

            switch(STATE.screen) {
                case 'welcome': renderWelcomeScreen(container); break;
                case 'setup': renderSetupScreen(container); break;
                case 'settings': renderSettingsScreen(container); break;
                case 'pass-to-player': renderPassToPlayerScreen(container); break;
                case 'reveal-role': renderRevealRoleScreen(container); break;
                case 'forgot-role-select': renderForgotRoleSelectScreen(container); break;
                case 'forgot-role-pass': renderForgotRolePassScreen(container); break;

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            if (!input) return;
            const name = input.value.trim();
            if (name === '') return;
            if (STATE.players.length >= 15) { alertCustom("الحد الأقصى 15 لاعب!"); return; }
            if (STATE.players.some(p => p.name.toLowerCase() === name.toLowerCase())) { alertCustom("الاسم هذا مستخدم!"); return; }
            const newId = STATE.players.length > 0 ? Math.max(...STATE.players.map(p => p.id)) + 1 : 1;
            STATE.players.push({ id: newId, name: name, score: 0, history: [] });
            input.value = ''; saveState(); render();
        }

        function removePlayer(id) {
            if (STATE.players.length <= 3) { alertCustom("لا يمكن إزالة لاعب! الحد الأدنى 3 لاعبين للعب."); return; }
            STATE.players = STATE.players.filter(p => p.id !== id);
            saveState(); render();
        }

        function movePlayerUp(index) {
            if (index > 0) {
                const temp = STATE.players[index - 1];
                STATE.players[index - 1] = STATE.players[index];
                STATE.players[index] = temp;
                saveState(); render();
            }
        }

        function movePlayerDown(index) {
            if (index < STATE.players.length - 1) {
                const temp = STATE.players[index + 1];
                STATE.players[index + 1] = STATE.players[index];
                STATE.players[index] = temp;
                saveState(); render();
            }
        }

            const player = STATE.players.find(p => p.id === id);
            if (!player) return;
            editingPlayerId = id;
            const modal = document.getElementById('customModal');
            const input = document.getElementById('modalInput');
            input.value = player.name;
            modal.classList.remove('hidden');
            setTimeout(() => input.focus(), 100);
        }

        function closeEditModal() {
            document.getElementById('customModal').classList.add('hidden');
            editingPlayerId = null;
        }

        function confirmEdit() {
            if (editingPlayerId === null) return;
            const newName = document.getElementById('modalInput').value.trim();
            if (newName !== '') {
                if (STATE.players.some(p => p.id !== editingPlayerId && p.name.toLowerCase() === newName.toLowerCase())) {
                    alertCustom("الاسم هذا موجود بالفعل!");
                    return;
                }
                const player = STATE.players.find(p => p.id === editingPlayerId);
                player.name = newName;
                saveState();
                render();
            }
            closeEditModal();
        }

            `;
        }

        function renderVoteActionScreen(container) {
            const voterId = STATE.currentRound.votingOrder[STATE.currentRound.currentVotingPlayerIdx];
            const currentPlayer = STATE.players.find(p => p.id === voterId);
            
            const isRandomSetting = STATE.outsidersCountSetting === 'random';
            const totalOutsiders = STATE.currentRound.outsiders.length;
            const maxSelections = isRandomSetting ? Math.max(1, Math.min(3, STATE.players.length - 2)) : totalOutsiders;

            let candidatesHtml = '';
            
            // جلب الأسماء وترتيبها أبجدياً لتسهيل البحث
            const candidates = STATE.players.filter(p => p.id !== currentPlayer.id);
            candidates.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            candidates.forEach(p => {
                const isSelected = STATE.currentRound.selectedSuspects.includes(p.id);
                candidatesHtml += `
                    <button onclick="toggleSuspectVote(${p.id})" class="w-full text-right p-2.5 glass-panel rounded-lg border transition flex items-center justify-between ${isSelected ? 'border-red-500 bg-red-950/25 glow-purple' : 'border-slate-800 hover:border-slate-700'}">
                        <div class="flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full ${isSelected ? 'bg-red-950 text-red-400' : 'bg-slate-800 text-slate-400'} flex items-center justify-center text-xs">👤</span>
                            <span class="font-bold text-xs ${isSelected ? 'text-red-400' : 'text-slate-200'}">${p.name}</span>
                        </div>
                        ${isSelected ? '<span class="text-[9px] text-red-400 font-black border border-red-800 px-1.5 py-0.5 rounded-full">برا السالفة</span>' : '<span class="text-[9px] text-slate-600 border border-slate-800 px-1.5 py-0.5 rounded-full">اختار</span>'}
                    </button>
                `;
            });

            const rulesInstructionHtml = isRandomSetting 
                ? `<p class="text-[10px] text-indigo-300 font-bold mt-0.5">بما أن عدد برا السالفة "عشوائي"، تكدر تختار أي عدد تشك بيهم!</p>`
                : `<p class="text-[10px] text-indigo-300 font-bold mt-0.5">لازم تختار بالضبط: ${totalOutsiders} (المختار حالياً: ${STATE.currentRound.selectedSuspects.length})</p>`;

            container.innerHTML = `
                <div class="w-full flex flex-col justify-between max-w-sm h-full space-y-2 py-1 overflow-hidden">
                    <div class="space-y-2 flex-1 flex flex-col overflow-hidden">
                        <div class="text-center shrink-0">
                            <h2 class="text-sm font-bold text-slate-400">دور اللاعب للتصويت سرياً:</h2>
                            <h3 class="text-xl font-black text-yellow-400 bg-slate-900 border border-slate-800 py-1 px-4 rounded-xl inline-block mt-0.5">🗳️ ${currentPlayer.name}</h3>
                        </div>
                        <div class="bg-indigo-950/40 border border-indigo-900/40 p-2 rounded-lg text-center shrink-0">
                            ${rulesInstructionHtml}
                        </div>
                        <div class="space-y-1 overflow-y-auto pr-0.5 flex-1">${candidatesHtml}</div>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="goToScreen('forgot-role-select')" class="py-2 px-2 bg-slate-900 border border-slate-800 text-slate-400 rounded-lg text-[10px] font-bold hover:bg-slate-800">
                            نسى دوره؟ 🤷‍♂️
                        </button>
                        <button onclick="confirmPlayerVote()" class="flex-1 py-2 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-lg font-bold text-xs shadow hover:scale-[1.01] transition">
                            تأكيد التصويت ✔️
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleSuspectVote(suspectId) {
            const isRandomSetting = STATE.outsidersCountSetting === 'random';
            const totalOutsiders = STATE.currentRound.outsiders.length;
            const maxSelections = isRandomSetting ? Math.max(1, Math.min(3, STATE.players.length - 2)) : totalOutsiders;

            const index = STATE.currentRound.selectedSuspects.indexOf(suspectId);
            if (index > -1) {
                STATE.currentRound.selectedSuspects.splice(index, 1);
            } else {
                if (STATE.currentRound.selectedSuspects.length >= maxSelections) {
                    alertCustom(isRandomSetting ? "الحد الأقصى للمشتبه بهم!" : `تكدر تختار ${totalOutsiders} كحد أقصى!`);
                    return;
                }
                STATE.currentRound.selectedSuspects.push(suspectId);
            }
            render();
        }

        function confirmPlayerVote() {
            const voterId = STATE.currentRound.votingOrder[STATE.currentRound.currentVotingPlayerIdx];
            const isRandomSetting = STATE.outsidersCountSetting === 'random';
            const totalOutsiders = STATE.currentRound.outsiders.length;

            if (isRandomSetting) {
                if (STATE.currentRound.selectedSuspects.length === 0) {
                    alertCustom("يا عيني اختار لاعب واحد على الأقل يشك بي!");
                    return;
                }
            } else {
                if (STATE.currentRound.selectedSuspects.length !== totalOutsiders) {
                    alertCustom(`لازم تصوت على ${totalOutsiders} لاعبين بالضبط حسب شروط الجولة!`);
                    return;
                }
            }

            STATE.currentRound.votes[voterId] = [...STATE.currentRound.selectedSuspects];

            if (STATE.currentRound.currentVotingPlayerIdx + 1 < STATE.players.length) {
                STATE.currentRound.currentVotingPlayerIdx += 1;
                STATE.currentRound.selectedSuspects = [];
                goToScreen('vote-action');
            } else {
                STATE.currentRound.currentOutsiderGuessIdx = 0;
                goToScreen('guess-pass');
            }
        }

        function renderGuessPassScreen(container) {
            const outsiderId = STATE.currentRound.outsiders[STATE.currentRound.currentOutsiderGuessIdx];
            const outsiderPlayer = STATE.players.find(p => p.id === outsiderId);

            container.innerHTML = `
                <div class="w-full flex flex-col items-center text-center space-y-3 px-1 my-auto shrink-0">
                    <span class="text-4xl animate-bounce">🤔</span>
                    <div class="space-y-1">
                        <span class="text-[10px] bg-red-950 border border-red-800 text-red-400 px-2 py-0.5 rounded-full font-bold">كشف برا السالفة</span>
                        <h2 class="text-lg font-black text-slate-100">انكشفت اللعبة! اللاعب برا السالفة هو:</h2>
                        <h3 class="text-2xl font-extrabold text-red-400 bg-slate-900 border border-slate-800 py-1.5 px-5 rounded-xl inline-block mt-1">${outsiderPlayer.name}</h3>
                        <p class="text-xs text-slate-400">هسه انطوا الجهاز إله ليخمن الكلمة من أصل 10 كلمات!</p>
                    </div>
                    <button onclick="goToScreen('guess-action')" class="w-full max-w-xs py-2.5 bg-gradient-to-r from-red-600 to-rose-600 text-white rounded-xl font-bold text-xs shadow transition mt-2">
                        أني ${outsiderPlayer.name}، جاهز أخمن 🕵️‍♂️
                    </button>
                </div>
            `;
        }

        function generateOutsiderGuessingOptions() {
            const secret = STATE.currentRound.secretWord;
            let targetCategory = 'food'; // Default fallback
            
            // تحديد التصنيف الفرعي الدقيق للكلمة حتى لو كان التصنيف المختار "عام"
            for (const [cat, words] of Object.entries(WORD_DATABASE)) {
                if (cat !== 'general' && words.includes(secret)) {
                    targetCategory = cat;
                    break;
                }
            }

            // سحب كلمات مموهة من نفس التصنيف لزيادة الصعوبة والمنطقية
            const pool = WORD_DATABASE[targetCategory].filter(w => w !== secret);
            const decoys = pool.sort(() => Math.random() - 0.5).slice(0, 9);
            return [secret, ...decoys].sort(() => Math.random() - 0.5);
        }

        let cacheGuessOptions = [];
        let lastGuesserId = null;

        function renderGuessActionScreen(container) {
            const outsiderId = STATE.currentRound.outsiders[STATE.currentRound.currentOutsiderGuessIdx];
            const outsiderPlayer = STATE.players.find(p => p.id === outsiderId);

            if (lastGuesserId !== outsiderId) {
                cacheGuessOptions = generateOutsiderGuessingOptions();
                lastGuesserId = outsiderId;
            }

            const chosenWord = STATE.currentRound.outsiderGuesses[outsiderId];
            let optionsHtml = '';
            cacheGuessOptions.forEach((word) => {
                const isSelected = chosenWord === word;
                // تم تكبير الخط هنا إلى text-sm sm:text-base وزيادة الحشوة py-3
                optionsHtml += `
                    <button onclick="selectGuessWord('${word}')" class="py-3 px-1 glass-panel rounded-lg border font-bold text-sm sm:text-base transition text-center ${isSelected ? 'border-yellow-400 bg-violet-950/40 text-yellow-400 scale-105 shadow-lg' : 'border-slate-800 text-slate-200 hover:border-slate-600 hover:bg-slate-800'}">
                        ${word}
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="w-full flex flex-col justify-between max-w-sm h-full space-y-3 py-1 overflow-hidden">
                    <div class="space-y-3 flex-1 flex flex-col overflow-hidden">
                        <div class="text-center shrink-0">
                            <h2 class="text-xs font-bold text-slate-400">خمن الكلمة يا بطل:</h2>
                            <h3 class="text-xl font-black text-red-400 block">${outsiderPlayer.name}</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-2 overflow-y-auto flex-1 pr-0.5 pb-2">
                            ${optionsHtml}
                        </div>
                    </div>
                    <button onclick="confirmOutsiderGuess()" class="w-full py-3 bg-gradient-to-r from-red-600 to-rose-600 text-white rounded-xl font-black text-sm shadow transition shrink-0">
                        تأكيد التخمين 🎯
                    </button>
                </div>
            `;
        }

        function selectGuessWord(word) {
            STATE.currentRound.outsiderGuesses[STATE.currentRound.outsiders[STATE.currentRound.currentOutsiderGuessIdx]] = word;
            render();
        }

        function confirmOutsiderGuess() {
            const outsiderId = STATE.currentRound.outsiders[STATE.currentRound.currentOutsiderGuessIdx];
            const chosenWord = STATE.currentRound.outsiderGuesses[outsiderId];
            
            if (!chosenWord) {
                alertCustom("لازم تختار كلمة وحدة من الـ 10 كلمات أولاً!");
                return;
            }

            if (STATE.currentRound.currentOutsiderGuessIdx + 1 < STATE.currentRound.outsiders.length) {
                STATE.currentRound.currentOutsiderGuessIdx += 1;
                goToScreen('guess-pass');
            } else {
                calculateRoundPoints();
                goToScreen('summary');
            }
        }

        let roundResultsCache = {};

        function calculateRoundPoints() {
            const secret = STATE.currentRound.secretWord;
            const outsiders = STATE.currentRound.outsiders;
            
            const playerRoundPoints = {}; 
            const votedStatsFlags = {}; 
            const guessSuccessFlags = {}; 
            const outsiderGuessesCache = { ...STATE.currentRound.outsiderGuesses };

            STATE.players.forEach(p => {
                if (outsiders.includes(p.id)) return; 
                const pVotes = STATE.currentRound.votes[p.id] || [];
                let pointsEarned = 0;
                let correctVotes = 0;
                let wrongVotes = 0;

                // استخراج أسماء اللاعبين الذين قام بالتصويت عليهم
                const votedNames = pVotes.map(vId => {
                    const vp = STATE.players.find(x => x.id === vId);
                    return vp ? vp.name : 'مجهول';
                });
                const votesStr = votedNames.length > 0 ? votedNames.join('، ') : 'محد';

                pVotes.forEach(vId => {
                    if (outsiders.includes(vId)) { pointsEarned += 1; correctVotes++; } 
                    else { pointsEarned -= 1; wrongVotes++; }
                });
                votedStatsFlags[p.id] = { correct: correctVotes, wrong: wrongVotes };
                playerRoundPoints[p.id] = pointsEarned;
                p.score += pointsEarned;
                
                // حفظ التاريخ (History) مع الأسماء
                p.history.unshift({
                    word: secret, role: 'داخل السالفة', points: pointsEarned,
                    desc: `صاد ${correctVotes} | غلط ${wrongVotes}`,
                    votes: votesStr
                });
            });

            outsiders.forEach(oId => {
                const guess = STATE.currentRound.outsiderGuesses[oId];
                const guessCorrect = (guess === secret);
                guessSuccessFlags[oId] = guessCorrect;
                const oPlayer = STATE.players.find(p => p.id === oId);
                let points = 0;
                if (guessCorrect) points += 1; 
                playerRoundPoints[oId] = points;
                if (oPlayer) {
                    oPlayer.score += points;
                    // حفظ التاريخ (History)
                    oPlayer.history.unshift({
                        word: secret, role: 'برا السالفة', points: points,
                        desc: guessCorrect ? 'خمن صح ✔️' : `خمن غلط (${guess}) ❌`
                    });
                }
            });

            // تقليم التاريخ لآخر 15 جولة لتوفير المساحة
            STATE.players.forEach(p => { if(p.history.length > 15) p.history = p.history.slice(0,15); });

            roundResultsCache = { secretWord: secret, outsiders: [...outsiders], playerRoundPoints, votedStatsFlags, guessSuccessFlags, outsiderGuessesCache };
            saveState();
        }

        function adjustScore(playerId, amount) {
            const player = STATE.players.find(p => p.id === playerId);
            if (player) {
                player.score += amount;
                
                // تسجيل التعديل اليدوي في السجل
                player.history.unshift({
                    word: '---', 
                    role: 'تعديل مسؤول', 
                    points: amount,
                    desc: amount > 0 ? 'إضافة نقاط يدوياً ➕' : 'خصم نقاط يدوياً ➖',
                    votes: null
                });
                
                if (player.history.length > 15) player.history = player.history.slice(0, 15);
                
                saveState();
                render(); // إعادة رسم واجهة النتائج فقط
            }
        }

        function openHistoryModal(playerId) {
            const player = STATE.players.find(p => p.id === playerId);
            if (!player) return;
            
            document.getElementById('historyPlayerName').innerText = `سجل: ${player.name}`;
            const container = document.getElementById('historyContent');
            
            if (player.history.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-slate-500 mt-10">لا توجد جولات مسجلة بعد.</p>`;
            } else {
                let html = '';
                player.history.forEach((h, i) => {
                    const isPositive = h.points > 0;
                    const isZero = h.points === 0;
                    const roleColor = h.role === 'برا السالفة' ? 'text-red-400' : 'text-indigo-400';
                    const ptColor = isPositive ? 'text-emerald-400' : (isZero ? 'text-slate-400' : 'text-red-500');
                    
                    // تنسيق قسم "صوت على"
                    const votesHtml = h.votes ? `<p class="text-[9px] text-slate-400 mt-1 border-t border-slate-700/50 pt-1">صوّت على: <span class="text-slate-200 font-bold">${h.votes}</span></p>` : '';
                    
                    html += `
                        <div class="bg-slate-800/50 p-2 rounded border border-slate-700/50 flex justify-between items-center text-[10px]">
                            <div class="flex-1">
                                <p class="font-bold text-slate-200">الكلمة: <span class="text-yellow-400">${h.word}</span></p>
                                <p class="text-slate-400">الدور: <span class="${roleColor} font-bold">${h.role}</span> - ${h.desc}</p>
                                ${votesHtml}
                            </div>
                            <span class="${ptColor} font-black text-xs block ml-2 shrink-0" dir="ltr">${h.points > 0 ? '+' : ''}${h.points}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            document.getElementById('historyModal').classList.remove('hidden');
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function renderSummaryScreen(container) {
            const results = roundResultsCache;
            
            let outsidersHtml = '';
            results.outsiders.forEach(oId => {
                const player = STATE.players.find(p => p.id === oId);
                const isGuessed = results.guessSuccessFlags[oId];
                const points = results.playerRoundPoints[oId];
                const guessWord = results.outsiderGuessesCache[oId] || 'لم يخمن';
                outsidersHtml += `
                    <div class="bg-red-950/20 border border-red-900/40 p-2 rounded-lg flex justify-between items-center text-right text-xs">
                        <div>
                            <h4 class="font-extrabold text-red-400 text-xs">${player.name}</h4>
                            <p class="text-[9px] text-slate-300">تخمينه: <span class="font-bold text-yellow-400">${guessWord}</span> - ${isGuessed ? '<span class="text-emerald-400 font-bold">صح ✔️</span>' : '<span class="text-red-400 font-bold">غلط ❌</span>'}</p>
                        </div>
                        <div class="text-left"><span class="${points > 0 ? 'text-emerald-400' : 'text-slate-400'} font-black text-xs block">+${points} ن</span></div>
                    </div>
                `;
            });

            let insidersHtml = '';
            STATE.players.forEach(p => {
                if (results.outsiders.includes(p.id)) return;
                const stats = results.votedStatsFlags[p.id];
                const points = results.playerRoundPoints[p.id];
                insidersHtml += `
                    <div class="bg-slate-900/60 border border-slate-800 p-2 rounded-lg flex justify-between items-center text-right text-xs">
                        <div>
                            <h4 class="font-extrabold text-indigo-400 text-xs">${p.name}</h4>
                            <p class="text-[9px] text-slate-300">صح: <span class="text-emerald-400">${stats.correct}</span> | غلط: <span class="text-red-400">${stats.wrong}</span></p>
                        </div>
                        <div class="text-left"><span class="${points >= 0 ? 'text-emerald-400' : 'text-red-400'} font-black text-xs block" dir="ltr">${points > 0 ? '+' : ''}${points} ن</span></div>
                    </div>
                `;
            });

            const sortedPlayers = [...STATE.players].sort((a, b) => b.score - a.score);
            let scoreboardHtml = '';
            sortedPlayers.forEach((p, idx) => {
                let badge = idx === 0 ? '👑' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
                scoreboardHtml += `
                    <div class="flex justify-between items-center py-1.5 border-b border-slate-800/60 text-xs">
                        <div class="flex items-center gap-1.5">
                            <span class="text-[10px] font-black text-slate-500 w-3">${idx + 1}</span>
                            <button onclick="openHistoryModal(${p.id})" class="font-bold text-slate-200 hover:text-indigo-300 transition underline decoration-slate-600 underline-offset-4" title="اضغط لرؤية السجل">${p.name} ${badge}</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex gap-0.5 bg-slate-900 border border-slate-700/50 rounded p-0.5">
                                <button onclick="adjustScore(${p.id}, 1)" class="text-emerald-400 hover:bg-slate-700 w-5 h-5 rounded flex items-center justify-center font-bold" title="إضافة نقطة">+</button>
                                <button onclick="adjustScore(${p.id}, -1)" class="text-red-400 hover:bg-slate-700 w-5 h-5 rounded flex items-center justify-center font-bold" title="خصم نقطة">-</button>
                            </div>
                            <span class="font-black text-yellow-400 text-xs w-12 text-left">${p.score} نقطة</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = `
                <div class="w-full flex flex-col justify-between max-w-sm h-full space-y-2 py-1 overflow-hidden">
                    <div class="space-y-2 flex-1 flex flex-col overflow-hidden">
                        <div class="bg-gradient-to-r from-violet-950 to-indigo-950 p-2.5 rounded-xl border border-violet-800/40 text-center shrink-0">
                            <span class="text-[9px] text-slate-400 block">الكلمة كانت:</span>
                            <span class="text-lg font-black text-yellow-400 block">"${results.secretWord}"</span>
                        </div>
                        
                        <div class="space-y-1.5 overflow-y-auto flex-1 pr-0.5">
                            <div class="space-y-1">
                                <h3 class="text-[10px] font-bold text-slate-400">🕵️‍♂️ نتائج برا السالفة:</h3>
                                <div class="space-y-1">${outsidersHtml}</div>
                            </div>
                            <div class="space-y-1">
                                <h3 class="text-[10px] font-bold text-slate-400">💬 نتائج داخل السالفة:</h3>
                                <div class="space-y-1">${insidersHtml}</div>
                            </div>
                            <div class="glass-panel p-2.5 rounded-xl border border-slate-800 space-y-1">
                                <h3 class="text-[10px] font-bold text-yellow-400 border-b border-slate-800 pb-1 flex justify-between">
                                    <span>لوحة الصدارة والترتيب</span>
                                    <span class="text-slate-400 font-normal">اضغط عالاسم للسجل</span>
                                </h3>
                                <div class="space-y-0.5">${scoreboardHtml}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="pt-1 flex gap-2 shrink-0">
                        <button onclick="showConfirmReset()" class="flex-1 py-2 bg-slate-900 border border-slate-800 text-red-400 rounded-lg font-bold text-xs">تصفير 🔄</button>
                        <button onclick="goToScreen('settings')" class="flex-[2] py-2 bg-gradient-to-r from-violet-600 to-indigo-600 text-white rounded-lg font-bold text-xs shadow transition">جولة جديدة 🔁</button>
                    </div>
                </div>
            `;
        }

        window.onload = function() { loadState(); render(); }
    </script>
</body>
</html>
